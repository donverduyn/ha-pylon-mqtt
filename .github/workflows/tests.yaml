name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:

permissions: {}

jobs:
  pytest:
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@v4"
      - uses: "actions/setup-python@v6"
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: pip install --require-hashes -r requirements_dev.lock.txt
      - name: Run test suite
        run: pytest
      - name: Ruff
        run: ruff check .
      - name: pip-audit (runtime dependencies)
        run: pip-audit -r requirements_runtime.txt
