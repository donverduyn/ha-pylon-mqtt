name: Hassfest

on:
  # Hassfest intentionally validates against live upstream rules and a
  # floating validator image. Run it weekly with no token permissions so that
  # drift is visible even when the outer action SHA has not changed.
  schedule:
    - cron: "29 6 * * 0"
  # Deliberately NOT adding labeled/unlabeled here — see tests.yaml's
  # identical comment for why (in short: `gh pr create --label` fires
  # opened and labeled as two separate events for the same commit, which
  # doubled every job below; detect-release's live label lookup covers the
  # common case with only one run).
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions: {}

concurrency:
  # See tests.yaml's identical group key for why this no longer needs an
  # event-kind suffix: labeled/unlabeled can't trigger this workflow at all.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # See detect-release.yaml for why this is a reusable-workflow call rather
  # than an inline job: tests.yaml and hacs.yaml need the exact same two
  # signals (is_release, skip_ci) and previously each carried their own
  # identical ~40-line copy of this job to get them.
  detect-release:
    uses: ./.github/workflows/detect-release.yaml
    permissions:
      contents: read
      pull-requests: read

  validate:
    runs-on: "ubuntu-latest"
    timeout-minutes: 15
    needs: [detect-release]
    # Skips at the job level (→ a real "skipped" conclusion) in the one
    # legitimate case: skip-ci is set AND detect-release confirmed this is
    # NOT a release — see hacs.yaml's identical job for the full reasoning
    # (this job is branch protection's actual required context, "validate",
    # so a confirmed release must still dispatch it to hit the bail step
    # below; an unconfirmed verdict fails closed to running the real check;
    # !cancelled() backs this job off if this run itself gets superseded,
    # rather than racing to complete real work that's about to be discarded).
    if: "!cancelled() && !(needs.detect-release.outputs.skip_ci == 'true' && needs.detect-release.outputs.is_release == 'false')"
    steps:
      # Checkout first (needed to resolve the local composite action below),
      # refuse-check second. No `if:` needed on it or the hassfest step
      # after: the refuse step failing already skips them via the default
      # per-step success() requirement.
      - uses: "actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5" # v4.3.1
      - name: Refuse skip-ci on a release PR
        # Duplicates detect-release's identical step (which only gives an
        # early signal — its own pass/fail isn't required by branch
        # protection) so *this* job explicitly fails instead of the
        # hassfest step below silently proceeding as if the label had been
        # ignored.
        uses: ./.github/actions/refuse-skip-ci-on-release
        with:
          is_release: ${{ needs.detect-release.outputs.is_release }}
          skip_ci: ${{ needs.detect-release.outputs.skip_ci }}
      - uses: "home-assistant/actions/hassfest@f4ca6f671bd429efb108c0f2fa0ae8af0215986c" # master @ 2026-06-22
