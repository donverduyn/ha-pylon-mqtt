name: Hassfest

on:
  # No push:master trigger: master commits are already covered by the
  # pull_request run on the PR that merged them (required by branch
  # protection). The daily schedule catches drift from upstream HA core
  # (this action clones it live — see the validate job), independent of
  # any push here.
  # types adds labeled/unlabeled to the opened/synchronize/reopened default
  # — see tests.yaml's identical comment for why the skip-ci gate needs it.
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  # pull-requests: read lets detect-release look up the PR's *current*
  # labels via `gh pr view` instead of trusting github.event.pull_request.
  # labels — see that job's comment for why.
  pull-requests: read

concurrency:
  # See tests.yaml's identical group key for why: the event-kind suffix
  # keeps a labeled/unlabeled-triggered run from cancelling (or being
  # cancelled by) a push-triggered run for the same commit, avoiding the
  # CANCELLED-conclusion-blocks-merge problem that produces even after a
  # later run supersedes it.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}-${{ (github.event.action == 'labeled' || github.event.action == 'unlabeled') && 'label' || 'push' }}
  cancel-in-progress: true

jobs:
  # See tests.yaml's detect-release job for why this exists and how the
  # skip-ci gate below uses it: duplicated here (rather than shared)
  # because separate workflow files can't reference each other's job
  # outputs.
  detect-release:
    runs-on: "ubuntu-latest"
    if: github.event_name == 'pull_request'
    outputs:
      is_release: ${{ steps.check.outputs.is_release }}
      skip_ci: ${{ steps.labels.outputs.skip_ci }}
      duplicate: ${{ steps.dedupe.outputs.duplicate }}
    steps:
      - uses: "actions/checkout@v4"
      - name: Compare manifest.json version against the PR base
        id: check
        run: |
          manifest="custom_components/pylontech_mqtt/manifest.json"
          new="$(jq -r .version "$manifest")"
          git fetch --depth=1 origin "${{ github.event.pull_request.base.sha }}"
          old="$(git show FETCH_HEAD:"$manifest" 2>/dev/null | jq -r .version || echo "")"
          if [ "$new" = "$old" ]; then
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Look up the skip-ci label live
        # See tests.yaml's identical step for why: github.event.pull_
        # request.labels is a snapshot frozen at whichever event triggered
        # this run, so a label attached moments later (e.g. `gh pr create`
        # immediately followed by `gh pr edit --add-label`, two separate
        # API calls/events) isn't visible to it. Asking the API directly
        # for current state means even this first run can see it.
        id: labels
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh pr view "${{ github.event.pull_request.number }}" --json labels -q '.labels[].name' \
              | grep -qx 'skip-ci'; then
            echo "skip_ci=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip_ci=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Refuse skip-ci on a release PR
        # See tests.yaml's identical step for why: skip-ci on a confirmed
        # release must not silently fall back to running the normal
        # checks — it must fail loudly so whoever applied the label
        # notices and removes it before this auto-releases unreviewed.
        if: steps.check.outputs.is_release == 'true' && steps.labels.outputs.skip_ci == 'true'
        run: |
          echo "::error::skip-ci cannot be applied to a release PR (manifest.json version changed against the base branch) — remove the label so the normal checks run before this auto-releases."
          exit 1
      - name: Check for an earlier, still-running instance of this same commit
        # See tests.yaml's identical step for why: `gh pr create --label`
        # fires two separate PR events (opened, then labeled) for the same
        # commit, each starting a full run of this workflow. Only an
        # *in-progress* earlier run counts, not any earlier run ever — a
        # labeled/unlabeled event arriving well after a previous run already
        # completed still needs to run for real.
        id: dedupe
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sha="${{ github.event.pull_request.head.sha }}"
          mine="${{ github.run_id }}"
          earlier=$(gh api "repos/${{ github.repository }}/actions/runs?event=pull_request&head_sha=$sha&per_page=50" \
            --jq "[.workflow_runs[] | select(.name == \"${{ github.workflow }}\") | select(.id < $mine) | select(.status != \"completed\")] | length")
          if [ "$earlier" -gt 0 ]; then
            echo "duplicate=true" >> "$GITHUB_OUTPUT"
          else
            echo "duplicate=false" >> "$GITHUB_OUTPUT"
          fi

  validate:
    runs-on: "ubuntu-latest"
    needs: [detect-release]
    # Skips at the job level (→ a real "skipped" conclusion) in the one
    # legitimate case: skip-ci is set AND detect-release confirmed this is
    # NOT a release — see hacs.yaml's identical job for the full reasoning
    # (this job is branch protection's actual required context, "validate",
    # so a confirmed release must still dispatch it to hit the bail step
    # below; an unconfirmed verdict fails closed to running the real check;
    # !cancelled() backs this job off if this run itself gets superseded,
    # rather than racing to complete real work that's about to be discarded).
    # duplicate != true additionally no-ops the redundant twin of a
    # `gh pr create --label`-style double-triggered run — see
    # detect-release's dedupe step.
    if: "!cancelled() && needs.detect-release.outputs.duplicate != 'true' && !(needs.detect-release.outputs.skip_ci == 'true' && needs.detect-release.outputs.is_release == 'false')"
    steps:
      - name: Refuse skip-ci on a release PR
        # Duplicates detect-release's identical step (which only gives an
        # early signal — its own pass/fail isn't required by branch
        # protection) so *this* job explicitly fails instead of the
        # checkout/hassfest steps below silently proceeding as if the
        # label had been ignored. No `if:` needed on checkout/hassfest
        # below: this step failing already skips them via the default
        # per-step success() requirement.
        if: needs.detect-release.outputs.is_release == 'true' && needs.detect-release.outputs.skip_ci == 'true'
        run: |
          echo "::error::skip-ci cannot be applied to a release PR — remove the label so this job runs normally before it auto-releases."
          exit 1
      - uses: "actions/checkout@v4"
      - uses: "home-assistant/actions/hassfest@f4ca6f671bd429efb108c0f2fa0ae8af0215986c" # master @ 2026-06-22
