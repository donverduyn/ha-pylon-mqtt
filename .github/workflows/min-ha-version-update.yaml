name: Minimum HA Version Update

on:
  workflow_dispatch:
  schedule:
    # Monday 08:30 UTC; offset from dependency-updates.yaml's 08:17 run so
    # the two don't race over the same working tree.
    - cron: "30 8 * * 1"

permissions: {}

concurrency:
  group: min-ha-version-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: "ubuntu-latest"
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: "actions/checkout@v4"
        with:
          fetch-depth: 0
          token: ${{ secrets.UPDATE_PR_TOKEN || github.token }}

      - uses: "astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39" # v8.2.0
        with:
          python-version: "3.14"
          cache-dependency-glob: |
            requirements*.txt

      - name: Refresh minimum supported HA version
        run: python3 scripts/update_dependencies.py --min-ha-version-only

      - name: Open or update minimum-version PR
        env:
          GH_TOKEN: ${{ secrets.UPDATE_PR_TOKEN || github.token }}
          BRANCH: automation/min-ha-version-update
          BASE_BRANCH: ${{ github.event.repository.default_branch }}
          PR_BODY: |
            Automated minimum-HA-version floor refresh generated by
            `scripts/update_dependencies.py --min-ha-version-only`.

            Targets whichever Home Assistant release was current
            ~MIN_HA_VERSION_MONTHS_BEHIND months ago (see
            scripts/update_dependencies.py), walking forward release-by-release
            (never backward) until one resolves cleanly — see
            requirements_dev_min.txt for why that walk-forward exists.

            **Not auto-merged.** Dropping support for an older HA version is
            a deliberate call, not a mechanical bump — review the diff
            (hacs.json, requirements_dev_min.txt/.lock.txt, tests.yaml's
            min python-version) before merging.
        run: |
          if git diff --quiet; then
            echo "No minimum-version update found."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add .
          git commit -m "Bump minimum supported Home Assistant version"
          git push --force-with-lease origin "$BRANCH"

          pr_number="$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number // ""')"
          if [ -n "$pr_number" ]; then
            gh pr edit "$pr_number" --title "Bump minimum supported Home Assistant version" --body "$PR_BODY"
          else
            gh pr create \
              --base "$BASE_BRANCH" \
              --head "$BRANCH" \
              --title "Bump minimum supported Home Assistant version" \
              --body "$PR_BODY"
          fi

          # Deliberately no `gh pr merge --auto` here, unlike
          # dependency-updates.yaml — a human reviews and merges this one.
