name: Review Stale Automation PRs

# Dependabot PRs are never closed here. GitHub treats a manual close as an
# instruction not to recreate that update, which can silently suppress a
# dependency or security fix. Stale Dependabot PRs are labelled for maintainer
# attention instead. Only this repository's disposable aggregation branches
# are recycled; their scheduled producer can safely open a fresh PR.
#
# Correctness does not depend on the relative start time of any other cron:
# scheduled workflows can be delayed or dropped by GitHub.
on:
  workflow_dispatch:
  schedule:
    - cron: "50 8 * * 1"

permissions: {}

concurrency:
  group: review-stale-automation-prs
  cancel-in-progress: true

jobs:
  review-stale:
    runs-on: "ubuntu-latest"
    timeout-minutes: 10
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Review stale dependency-automation PRs
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          gh label create automation-needs-attention --repo "$REPO" --force \
            --color D93F0B \
            --description "Automation update is blocked or has remained open unusually long"

          prs="$(
            gh pr list --repo "$REPO" --state open --limit 1000 \
              --json number,author,headRefName,createdAt,labels
          )"

          if [ "$(echo "$prs" | jq 'length')" = "0" ]; then
            echo "No open PRs."
            exit 0
          fi

          now="$(date +%s)"
          while read -r pr; do
            number="$(echo "$pr" | jq -r .number)"
            author="$(echo "$pr" | jq -r '.author.login // ""')"
            head_ref="$(echo "$pr" | jq -r .headRefName)"
            created_at="$(echo "$pr" | jq -r .createdAt)"
            created_epoch="$(date -d "$created_at" +%s)"
            age_days=$(( (now - created_epoch) / 86400 ))

            is_dependabot=false
            if [ "$author" = "dependabot[bot]" ] \
              || [ "$author" = "app/dependabot" ]; then
              is_dependabot=true
            fi

            is_ours=false
            if [ "$head_ref" = "automation/dependency-updates" ] \
              || [ "$head_ref" = "automation/min-ha-version-update" ]; then
              is_ours=true
            fi

            if [ "$is_dependabot" != "true" ] && [ "$is_ours" != "true" ]; then
              continue
            fi

            echo "::group::PR #$number ($author, $head_ref)"
            if [ "$age_days" -lt 7 ]; then
              echo "Open $age_days days — not stale."
              echo "::endgroup::"
              continue
            fi

            if [ "$is_dependabot" = "true" ]; then
              if ! echo "$pr" | jq -e \
                '.labels[]?.name == "automation-needs-attention"' >/dev/null; then
                gh pr edit "$number" --repo "$REPO" \
                  --add-label automation-needs-attention
                gh pr comment "$number" --repo "$REPO" --body \
                  "This Dependabot PR has been open for at least seven days and needs maintainer attention. It is deliberately left open: closing a Dependabot PR prevents Dependabot from recreating that update. Resolve, supersede, or explicitly ignore the update rather than using stale cleanup."
              fi
              echo "Labelled for attention and left open."
              echo "::endgroup::"
              continue
            fi

            gh pr close "$number" --repo "$REPO" --comment \
              "Closing this stale repository-owned automation PR. Its next scheduled producer run will create a fresh branch and PR from the current dependency state."

            # Best effort: the PR is already closed even if branch deletion
            # is temporarily rejected.
            gh api "repos/$REPO/git/refs/heads/$head_ref" -X DELETE \
              >/dev/null 2>&1 \
              && echo "Deleted branch $head_ref." \
              || echo "Could not delete branch $head_ref; leaving it in place."
            echo "::endgroup::"
          done < <(echo "$prs" | jq -c '.[]')
