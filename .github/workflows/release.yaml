name: Release

# Build, scan, attest, and publish one immutable version. The Git tag and
# GitHub Release are created only after the versioned image and attestations
# exist. Cross-service publication cannot be atomic, so a versioned image may
# remain after a late failure; preflight checks refuse to overwrite that state
# and turn recovery into an explicit maintainer decision.
on:
  workflow_call:
    inputs:
      tag:
        description: "The v-prefixed release tag; it must match manifest.json"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: "The v-prefixed release tag; it must match manifest.json"
        required: true
        type: string

permissions: {}

# Serialize all publications because final releases may update shared :latest.
concurrency:
  group: release-publication
  cancel-in-progress: false
  queue: max

jobs:
  validate:
    runs-on: "ubuntu-latest"
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
      is_prerelease: ${{ steps.release.outputs.is_prerelease }}
      retag_latest: ${{ steps.release.outputs.retag_latest }}
    steps:
      - uses: "actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5" # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate identity and preflight immutable names
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_TAG: ${{ inputs.tag }}
          REPO: ${{ github.repository }}
          TARGET_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          # Project releases use vMAJOR.MINOR.PATCH plus an optional
          # SemVer-style prerelease suffix. This alphabet is also safe in
          # Docker tags and GitHub output records.
          if [[ ! "$INPUT_TAG" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z]+([.-][0-9A-Za-z]+)*)?$ ]]; then
            echo "::error::Invalid release tag '$INPUT_TAG'; expected vMAJOR.MINOR.PATCH with an optional prerelease suffix."
            exit 1
          fi

          version="${INPUT_TAG#v}"
          if [[ "$version" == *-* ]]; then
            is_prerelease=true
          else
            is_prerelease=false
          fi

          manifest_version="$(
            jq -er .version custom_components/pylontech_mqtt/manifest.json
          )"
          if [ "$version" != "$manifest_version" ]; then
            echo "::error::Tag $INPUT_TAG does not match manifest.json version $manifest_version."
            exit 1
          fi

          git fetch --no-tags origin master
          if ! git merge-base --is-ancestor "$TARGET_SHA" origin/master; then
            echo "::error::Commit $TARGET_SHA is not reachable from origin/master."
            exit 1
          fi

          set +e
          existing_tag="$(
            git ls-remote --exit-code --tags origin \
              "refs/tags/$INPUT_TAG" "refs/tags/$INPUT_TAG^{}" 2>&1
          )"
          tag_status=$?
          set -e
          case "$tag_status" in
            0)
              echo "::error::Tag $INPUT_TAG already exists; releases are never updated in place."
              echo "$existing_tag"
              exit 1
              ;;
            2)
              ;;
            *)
              echo "::error::Could not determine whether tag $INPUT_TAG exists."
              echo "$existing_tag"
              exit 1
              ;;
          esac

          if gh api "repos/$REPO/releases/tags/$INPUT_TAG" \
            >/dev/null 2>/tmp/release-api-error; then
            echo "::error::A GitHub Release for $INPUT_TAG already exists."
            exit 1
          elif ! grep -q "HTTP 404" /tmp/release-api-error; then
            echo "::error::Could not determine whether the GitHub Release exists."
            cat /tmp/release-api-error
            exit 1
          fi

          retag_latest=false
          if [ "$is_prerelease" = "false" ]; then
            tag_listing="$(git ls-remote --tags origin 'refs/tags/v*')" || {
              echo "::error::Could not list existing release tags."
              exit 1
            }
            latest_published="$(
              printf '%s\n' "$tag_listing" \
                | sed -E 's/\^\{\}$//; s#.*refs/tags/v##' \
                | { grep -Ev '[-]' || true; } \
                | sort -V \
                | tail -n1
            )"
            if [ -z "$latest_published" ] \
              || [ "$(
                printf '%s\n%s\n' "$latest_published" "$version" \
                  | sort -V | tail -n1
              )" = "$version" ]; then
              retag_latest=true
            else
              echo "::warning::Not moving :latest to $version because $latest_published is newer."
            fi

            if ! ls tests/fixtures/transcripts/*.json >/dev/null 2>&1; then
              echo "::warning::Publishing final release $version without a real-hardware transcript."
            fi
          fi

          {
            echo "tag=$INPUT_TAG"
            echo "version=$version"
            echo "is_prerelease=$is_prerelease"
            echo "retag_latest=$retag_latest"
          } >> "$GITHUB_OUTPUT"

  build-and-scan:
    needs: validate
    runs-on: "ubuntu-latest"
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - uses: "actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5" # v4.3.1
        with:
          persist-credentials: false

      - name: Build release image
        env:
          TARGET_SHA: ${{ github.sha }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          docker build -f docker/Dockerfile \
            --build-arg GIT_SHA="$TARGET_SHA" \
            --build-arg SIDECAR_VERSION="$VERSION" \
            --tag pylon2mqtt:release .

      - name: Gate on fixable high or critical vulnerabilities
        uses: "aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25" # v0.36.0
        with:
          image-ref: "pylon2mqtt:release"
          format: "table"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true

      - name: Generate SBOM with checksum-pinned Syft
        run: |
          set -euo pipefail
          # shellcheck disable=SC1091
          . .devcontainer/tool-versions.env
          curl -fsSLo /tmp/syft.tar.gz \
            "https://github.com/anchore/syft/releases/download/v$SYFT_VERSION/syft_${SYFT_VERSION}_linux_amd64.tar.gz"
          echo "$SYFT_SHA256  /tmp/syft.tar.gz" | sha256sum -c
          tar xzf /tmp/syft.tar.gz -C /tmp syft
          /tmp/syft pylon2mqtt:release \
            -o spdx-json=pylon2mqtt-sbom.spdx.json

      - name: Save release image
        run: docker save pylon2mqtt:release | gzip > pylon2mqtt-release.tar.gz

      - uses: "actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a" # v7.0.1
        with:
          name: release-image
          path: pylon2mqtt-release.tar.gz
          compression-level: 0
          retention-days: 1

      - uses: "actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a" # v7.0.1
        with:
          name: release-sbom
          path: pylon2mqtt-sbom.spdx.json
          retention-days: 1

  publish-image:
    needs: [validate, build-and-scan]
    runs-on: "ubuntu-latest"
    timeout-minutes: 20
    environment: release
    permissions:
      actions: read
      packages: write
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: "actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c" # v8.0.1
        with:
          name: release-image

      - name: Load, preflight, and push versioned image
        id: push
        env:
          GH_TOKEN: ${{ github.token }}
          IMAGE_NAME: ghcr.io/${{ github.repository }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          gzip -dc pylon2mqtt-release.tar.gz | docker load
          image_ref="$IMAGE_NAME:$VERSION"
          docker tag pylon2mqtt:release "$image_ref"
          printf '%s' "$GH_TOKEN" \
            | docker login ghcr.io --username "$GITHUB_ACTOR" --password-stdin

          if docker manifest inspect "$image_ref" \
            >/dev/null 2>/tmp/manifest-error; then
            echo "::error::Container tag $image_ref already exists; refusing to overwrite it."
            exit 1
          elif ! grep -Eqi \
            'manifest unknown|no such manifest|not found' /tmp/manifest-error; then
            echo "::error::Could not determine whether $image_ref exists."
            cat /tmp/manifest-error
            exit 1
          fi

          docker push "$image_ref" 2>&1 | tee /tmp/docker-push.log
          digest="$(
            sed -n \
              's/^.*digest: \(sha256:[0-9a-f]\{64\}\).*$/\1/p' \
              /tmp/docker-push.log \
              | tail -n1
          )"
          if [ -z "$digest" ]; then
            echo "::error::The registry push did not report an image digest."
            exit 1
          fi
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

  attest-image:
    needs: [build-and-scan, publish-image]
    runs-on: "ubuntu-latest"
    timeout-minutes: 15
    environment: release
    permissions:
      actions: read
      artifact-metadata: write
      attestations: write
      id-token: write
      packages: write
    steps:
      - uses: "actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c" # v8.0.1
        with:
          name: release-sbom

      - name: Authenticate attestation publication
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          printf '%s' "$GH_TOKEN" \
            | docker login ghcr.io --username "$GITHUB_ACTOR" --password-stdin

      - name: Attest build provenance
        uses: "actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26" # v4.1.0
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ needs.publish-image.outputs.digest }}
          push-to-registry: true
          create-storage-record: false

      - name: Attest SBOM
        uses: "actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26" # v4.1.0
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ needs.publish-image.outputs.digest }}
          sbom-path: pylon2mqtt-sbom.spdx.json
          push-to-registry: true
          create-storage-record: false

  publish-release:
    needs: [validate, build-and-scan, publish-image, attest-image]
    runs-on: "ubuntu-latest"
    timeout-minutes: 10
    environment: release
    permissions:
      actions: read
      contents: write
    steps:
      - uses: "actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c" # v8.0.1
        with:
          name: release-sbom

      - name: Recheck immutable names and create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          IS_PRERELEASE: ${{ needs.validate.outputs.is_prerelease }}
          REPO: ${{ github.repository }}
          TAG: ${{ needs.validate.outputs.tag }}
          TARGET_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          for endpoint in "git/ref/tags/$TAG" "releases/tags/$TAG"; do
            if gh api "repos/$REPO/$endpoint" \
              >/dev/null 2>/tmp/github-api-error; then
              echo "::error::$endpoint already exists; refusing to mutate it."
              exit 1
            elif ! grep -q "HTTP 404" /tmp/github-api-error; then
              echo "::error::Could not preflight $endpoint."
              cat /tmp/github-api-error
              exit 1
            fi
          done

          args=(
            release create "$TAG"
            pylon2mqtt-sbom.spdx.json
            --repo "$REPO"
            --target "$TARGET_SHA"
            --generate-notes
          )
          if [ "$IS_PRERELEASE" = "true" ]; then
            args+=(--prerelease)
          fi
          gh "${args[@]}"

  tag-latest:
    needs: [validate, publish-image, publish-release]
    if: >-
      needs.validate.outputs.is_prerelease == 'false' &&
      needs.validate.outputs.retag_latest == 'true'
    runs-on: "ubuntu-latest"
    timeout-minutes: 10
    environment: release
    permissions:
      packages: write
    steps:
      - name: Move latest to the published immutable version
        env:
          GH_TOKEN: ${{ github.token }}
          IMAGE_NAME: ghcr.io/${{ github.repository }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          printf '%s' "$GH_TOKEN" \
            | docker login ghcr.io --username "$GITHUB_ACTOR" --password-stdin
          docker buildx imagetools create \
            --tag "$IMAGE_NAME:latest" \
            "$IMAGE_NAME:$VERSION"
