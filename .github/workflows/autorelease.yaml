name: Auto-release

# A push that changes manifest.json's version is a deliberate release request.
# Every push is also tested by tests.yaml; publication waits for the exact
# push-triggered Tests run to pass before calling the reusable release pipeline.
on:
  push:
    branches:
      - master

permissions: {}

# Preserve every queued version bump. Without queue:max, GitHub keeps only one
# pending run and may silently supersede an intermediate release event.
concurrency:
  group: autorelease-detection
  cancel-in-progress: false
  queue: max

jobs:
  detect:
    runs-on: "ubuntu-latest"
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      release: ${{ steps.check.outputs.release }}
      tag: ${{ steps.check.outputs.tag }}
    steps:
      - uses: "actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5" # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check whether this push changed the manifest version
        id: check
        env:
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail
          manifest="custom_components/pylontech_mqtt/manifest.json"
          new="$(jq -er .version "$manifest")"

          if [[ "$BEFORE_SHA" =~ ^0+$ ]]; then
            old=""
          else
            if ! git cat-file -e "$BEFORE_SHA^{commit}" 2>/dev/null; then
              echo "::error::Push predecessor $BEFORE_SHA is unavailable; refusing to infer the version diff from HEAD^."
              exit 1
            fi
            old="$(git show "$BEFORE_SHA:$manifest" 2>/dev/null | jq -er .version)"
          fi

          if [ "$new" = "$old" ]; then
            echo "Version unchanged ($new) — nothing to release."
            echo "release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          tag="v$new"
          set +e
          existing_tag="$(
            git ls-remote --exit-code --tags origin \
              "refs/tags/$tag" "refs/tags/$tag^{}" 2>&1
          )"
          tag_status=$?
          set -e
          case "$tag_status" in
            0)
              echo "::warning::Version changed $old -> $new, but $tag already exists; not overwriting an immutable release."
              echo "$existing_tag"
              echo "release=false" >> "$GITHUB_OUTPUT"
              exit 0
              ;;
            2)
              ;;
            *)
              echo "::error::Could not determine whether $tag exists."
              echo "$existing_tag"
              exit 1
              ;;
          esac

          echo "Version changed ${old:-<none>} -> $new; release tag is $tag."
          {
            echo "release=true"
            echo "tag=$tag"
          } >> "$GITHUB_OUTPUT"

  wait-for-tests:
    needs: detect
    if: needs.detect.outputs.release == 'true'
    runs-on: "ubuntu-latest"
    timeout-minutes: 60
    permissions:
      actions: read
    steps:
      - name: Require the push-triggered Tests run for this commit
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TARGET_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          run_id=""
          for _ in $(seq 1 60); do
            run_id="$(
              gh run list --repo "$REPO" --workflow tests.yaml \
                --event push --commit "$TARGET_SHA" --limit 20 \
                --json databaseId,createdAt \
                --jq 'sort_by(.createdAt) | .[-1].databaseId // empty'
            )"
            if [ -n "$run_id" ]; then
              break
            fi
            sleep 10
          done

          if [ -z "$run_id" ]; then
            echo "::error::No push-triggered Tests run appeared for $TARGET_SHA."
            exit 1
          fi

          echo "Waiting for Tests run $run_id for $TARGET_SHA."
          gh run watch "$run_id" --repo "$REPO" --exit-status

  release:
    needs: [detect, wait-for-tests]
    if: >-
      needs.detect.outputs.release == 'true' &&
      needs.wait-for-tests.result == 'success'
    permissions:
      actions: read
      artifact-metadata: write
      attestations: write
      contents: write
      id-token: write
      packages: write
    uses: ./.github/workflows/release.yaml
    with:
      tag: ${{ needs.detect.outputs.tag }}
