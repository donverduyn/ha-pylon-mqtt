name: Refuse skip-ci on a release PR
description: >
  Fails the step (::error + exit 1) if is_release and skip_ci are both
  'true'. Shared by detect-release.yaml (the early, non-required-check
  signal), hacs.yaml's validate job, and hassfest.yaml's validate job (each
  the real, required-check enforcement for their workflow) -- previously
  three-going-on-four identical inline copies of this echo/exit pair. Not
  used by tests.yaml's tests-finished job: that job has no checkout step of
  its own today, and adding one solely to resolve this local composite
  action would cost more than the duplicated four lines it'd save.

inputs:
  is_release:
    required: true
    description: "'true' if this PR bumps manifest.json's version"
  skip_ci:
    required: true
    description: "'true' if the skip-ci label is currently on this PR"

runs:
  using: composite
  steps:
    - if: inputs.is_release == 'true' && inputs.skip_ci == 'true'
      shell: bash
      run: |
        echo "::error::skip-ci cannot be applied to a release PR — remove the label so this job runs normally before it auto-releases."
        exit 1
