name: Set up Python environment
description: >
  Installs the repository-pinned uv and requested Python version, then restores
  or installs the exact hash-pinned environment for the supplied lockfile.

inputs:
  python-version:
    required: true
  lockfile:
    required: true
    description: "Path to the hash-pinned requirements lock file"

outputs:
  cache-hit:
    description: "Whether the installed environment came from cache"
    value: ${{ steps.venv-cache.outputs.cache-hit }}

runs:
  using: composite
  steps:
    - id: setup-uv
      uses: "astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990" # v8.3.2
      with:
        # setup-uv reads uv.toml's exact required-version.
        python-version: ${{ inputs.python-version }}
        activate-environment: true
        cache-dependency-glob: ${{ inputs.lockfile }}

    - name: Cache installed environment
      id: venv-cache
      uses: "actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9" # v6.1.0
      with:
        path: .venv
        # A lockfile alone is insufficient: interpreter ABI, architecture,
        # runner platform, and uv behavior can all change installed bytes.
        key: venv-v2-${{ runner.os }}-${{ runner.arch }}-py${{ inputs.python-version }}-uv${{ steps.setup-uv.outputs.uv-version }}-${{ hashFiles(inputs.lockfile) }}

    - name: Install dependencies
      if: steps.venv-cache.outputs.cache-hit != 'true'
      shell: bash
      env:
        LOCKFILE: ${{ inputs.lockfile }}
      run: uv pip install --require-hashes -r "$LOCKFILE"
